<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Home</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">
                <span class="material-symbols-outlined">home</span>
            </div>
            <h1>Smart Home Login</h1>
            <p>Access your home environment securely.</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)" method="POST">
                
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="admin@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <span class="material-symbols-outlined toggle-password" onclick="togglePasswordVisibility()">visibility_off</span>
                    </div>
                </div>
                
                <div id="email-error" class="error-text"></div> 
                
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
