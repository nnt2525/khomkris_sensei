<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Native WebSocket Control</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding-top: 50px;
        }
        h1 { color: #333; }
        .button-container { margin-top: 30px; }
        
        .open-button { 
            background-color: #28a745; 
            color: white; 
            padding: 20px 40px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: none;
            font-size: 18px;
            margin: 10px;
            transition: 0.3s;
        }
        .close-button { 
            background-color: #dc3545; 
            color: white; 
            padding: 20px 40px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: none;
            font-size: 18px;
            margin: 10px;
            transition: 0.3s;
        }
        .open-button:hover, .close-button:hover { opacity: 0.8; transform: scale(1.05); }
        #status-container { margin-bottom: 20px; font-size: 1.2em; }
        #status { font-weight: bold; color: orange; }
    </style>
</head>
<body>

    <h1>ESP32 Control Panel</h1>
    
    <div id="status-container">
        Status: <span id="status">Connecting...</span>
    </div>

    <div class="button-container">
        <hr>
        <p>ห้องนอน</p>
        <button class="open-button" onclick="sendTrigger('OPEN_TRUNON_ROOM1')">เปิดไฟ (ON)</button>
        <button class="close-button" onclick="sendTrigger('CLOSE_TRUNOFF_ROOM1')">ปิดไฟ (OFF)</button><br>
        <hr>
        <p>ห้องนั่งเล่น</p>
        <button class="open-button" onclick="sendTrigger('OPEN_TRUNON_ROOM2')">เปิดไฟ (ON)</button>
        <button class="close-button" onclick="sendTrigger('CLOSE_TRUNOFF_ROOM2')">ปิดไฟ (OFF)</button><br>
        <hr>
        <p>ห้องครัว</p>
        <button class="open-button" onclick="sendTrigger('OPEN_TRUNON_ROOM3')">เปิดไฟ (ON)</button>
        <button class="close-button" onclick="sendTrigger('CLOSE_TRUNOFF_ROOM3')">ปิดไฟ (OFF)</button><br>
        <hr>
    </div>

    <script>
        const statusText = document.getElementById("status");
        const ws = new WebSocket("ws://" + window.location.host);

        ws.onopen = () => { 
            console.log("Connected to Server!"); 
            statusText.innerText = "Connected";
            statusText.style.color = "green";
        };

        ws.onclose = () => { 
            statusText.innerText = "Disconnected";
            statusText.style.color = "red";
        };

        function sendTrigger(action) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(action);
                console.log('Sent:', action);
            } else {
                alert('WebSocket is not connected!');
            }
        }
    </script>
</body>
</html>
